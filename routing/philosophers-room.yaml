room:
  id: philosophers-room
  mode: moderated_multi_agent
  defaultVisibleBots:
    - freud
    - aristotle
    - marcus
  moderator:
    enabled: true
    internalOnly: true
    authority: final

routing:
  requireExplicitSelection: true
  directMentionDoesNotAuthorizeReply: true
  directQuestionDoesNotAuthorizeReply: true
  maxPhilosopherRepliesPerUserTurn: 2
  allowSameSpeakerTwice: false
  defaultSequence:
    - selected_philosopher
    - optional_contrast_philosopher
    - stop_or_summary
  silencePolicy:
    preferSilenceOverRedundancy: true
    remainSilentIfNoDistinctValue: true

contrastMap:
  freud:
    preferredNext:
      - aristotle
      - marcus
  aristotle:
    preferredNext:
      - freud
      - marcus
  marcus:
    preferredNext:
      - freud
      - aristotle

repetitionControl:
  enabled: true
  compareLastMessages: 3
  maxSemanticSimilarity: 0.72
  ifTooSimilar:
    - shorten
    - refine
    - or_remain_silent

caps:
  crowdedChatWords: 70
  normalWords: 110
  hardMaxWords: 140
  moderatorSummaryWords: 90

summary:
  enabled: true
  triggerAfterPhilosopherReplies: 2
  include:
    - main_issue
    - strongest_contrast
    - practical_takeaway

debate:
  enabled: true
  steelmanBeforeCritique: true
  noStrawman: true
  identifyAgreementBeforeDisagreement: true
  stopCircularRepetition: true

telegram:
  requireMention: false
  privacyMode: false
  useReplyToCurrent: false
